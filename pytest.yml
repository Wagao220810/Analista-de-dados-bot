name: CI - Testes Automatizados

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Fazer checkout do código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # Altere para a versão que você utiliza
        cache: 'pip' # Acelera as próximas execuções fazendo cache dos pacotes

    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib seaborn numpy python-dotenv openpyxl google-generativeai sqlalchemy plotly pygwalker pyperclip pytest

    - name: 🧪 Executar testes com pytest
      run: |
        pytest -v